<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectors</title>
    <style>
        .odd {
            background-color: rgb(255, 100, 144);
            font-family: Verdana, "DejaVu Sans", sans-serif;
        }
        #line_2 {
            color: blue;
            font-size: 36px;
        }
        #line_3 {
            font-size: 24px;
        }
        #line_4 {
            background-color: rgb(33, 255, 33);
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="odd">Number 1 - I'm a class!</div>
    <br>
    <div id="line_2">Number 2 - I'm one ID.</div>
    <br>
    <div class="odd" id="line_3">Number 3 - I'm a class, but cooler!</div>
    <br>
    <div id="line_4">I'm another ID.</div>
    <br>
    <div class="odd">I'm a class!</div>
</body>
</html>
